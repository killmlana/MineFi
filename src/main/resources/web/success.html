<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
        }
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c853, #00e676);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: pop 0.4s ease-out;
        }
        .checkmark svg {
            width: 40px;
            height: 40px;
            stroke: #0f0f0f;
            stroke-width: 3;
            fill: none;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .subtitle {
            font-size: 16px;
            color: #8888aa;
            margin-bottom: 32px;
        }
        .detail {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #2a2a4a;
            font-size: 14px;
        }
        .detail:last-child { border-bottom: none; }
        .detail .label { color: #8888aa; }
        .detail .value { color: #ffffff; font-weight: 600; }
        .status {
            display: inline-block;
            margin-top: 24px;
            padding: 8px 20px;
            background: rgba(0, 200, 83, 0.15);
            color: #00e676;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .footer {
            margin-top: 32px;
            font-size: 13px;
            color: #555577;
        }
        .footer strong {
            color: #8888aa;
        }
        @keyframes pop {
            0% { transform: scale(0); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="checkmark">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Payment Successful</h1>
        <p class="subtitle">Your balance has been updated in-game</p>

        <div class="detail">
            <span class="label">Status</span>
            <span class="value" style="color: #00e676;">Confirmed</span>
        </div>
        <div class="detail">
            <span class="label">Provider</span>
            <span class="value">MineFi Gateway</span>
        </div>

        <span class="status">BALANCE CREDITED</span>

        <p class="footer">You can close this page and return to Minecraft.<br><strong>MineFi Payment Gateway</strong></p>
    </div>
</body>
</html>
