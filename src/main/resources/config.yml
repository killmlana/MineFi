providers:
  crypto:
    enabled: false
    walletconnect:
      project-id: ""
      relay-url: "wss://relay.walletconnect.com"
      metadata-url: "https://minefi.pages.dev"
    chain:
      rpc-url: ""
      chain-id: 1
    vault:
      server-hot-wallet: ""
      server-hot-wallet-key: ""
      escrow-contract: ""
  stripe:
    enabled: false
    secret-key: ""
    currency: "usd"
    poll-interval-seconds: 10
    amounts: [5, 10, 25, 50]
    # Default redirect pages hosted on Cloudflare Pages.
    # To host your own, see docs/REDIRECT_PAGES.md
    success-url: "https://minefi.pages.dev/success"
    cancel-url: "https://minefi.pages.dev/failure"

  razorpay:
    enabled: false
    key-id: ""
    key-secret: ""
    currency: "inr"
    poll-interval-seconds: 10
    amounts: [100, 500, 1000, 5000]
    # Default redirect page hosted on Cloudflare Pages.
    # To host your own, see docs/REDIRECT_PAGES.md
    success-url: "https://minefi.pages.dev/success"

vault:
  enabled: true
  tx-timeout-seconds: 60
  withdrawal-cooldown-seconds: 300
  merkle-root-interval-minutes: 60
