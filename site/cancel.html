<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
        }
        .card {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            border: 1px solid #2a2a4a;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff5252, #ff1744);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .icon svg {
            width: 36px;
            height: 36px;
            stroke: #0f0f0f;
            stroke-width: 3;
            fill: none;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }
        .subtitle {
            font-size: 16px;
            color: #8888aa;
            margin-bottom: 32px;
        }
        .status {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255, 82, 82, 0.15);
            color: #ff5252;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .footer {
            margin-top: 32px;
            font-size: 13px;
            color: #555577;
        }
        .footer strong {
            color: #8888aa;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </div>
        <h1>Payment Cancelled</h1>
        <p class="subtitle">No charges were made to your account</p>
        <span class="status">NOT CHARGED</span>
        <p class="footer">You can close this page and try again in Minecraft.<br><strong>MineFi Payment Gateway</strong></p>
    </div>
</body>
</html>
